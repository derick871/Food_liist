<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
    <div>
        <div id="calories-list">
        <div id="container">
        <h1><span1>Calorie tracker</span></h1><br>
        <!--------form----->

        <div id="food-form">
        <form method="submit">
         <label for="food">Food: </label>
            <input
             type="text"
             id ="food-name"
              placeholder="food-name"
              required> <br><br>
            <label for="calories">Calories:</label>
            <input 
            type="number"
            id ="calories" 
            placeholder="calories"
            required>  <br><br>
            
            <button type="submit" id="btn">Add food </button>
        </form>
     </div>

        <div>
        <div>
               <ul id="food-list">
            </ul>
        </div><br>
        <h3>Total Calories: <span id="total">0</span></h3><br>

        <button  id="reset">Reset List</button>
       </div>
        </div>
        </div>
    </div>
</body>
</html>
